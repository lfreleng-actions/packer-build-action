# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: Test Packer Validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-validate:
    name: Test Validation Mode
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout packer-build-action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: action-repo

      - name: Checkout test repository with Packer templates
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: lfit/releng-common-packer
          path: target-repo
          submodules: recursive

      - name: Run Packer validation
        uses: ./action-repo
        with:
          mode: validate
          packer_working_dir: "."
          path_prefix: "target-repo"
          packer_version: "1.11.2"
          python_version: "3.11"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Test Results"
            echo "✅ Validation test completed"
          } >> "${GITHUB_STEP_SUMMARY}"
